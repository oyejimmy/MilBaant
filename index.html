<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/pwa-icon.svg" />
    <link rel="icon" type="image/png" href="/pwa-icon.png" />
    <link rel="apple-touch-icon" href="/pwa-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Mobile-optimized viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />

    <!-- Theme colors for mobile browsers -->
    <meta name="theme-color" content="#1c8ee5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1e1e1e" media="(prefers-color-scheme: dark)" />

    <!-- PWA / iOS specific meta tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MilBaant" />
    <meta name="application-name" content="MilBaant" />

    <!-- Prevent automatic phone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <!-- SEO -->
    <meta name="description" content="Track flatmate expenses, rides, cook ledger, and contributions with MilBaant." />
    <meta name="keywords" content="flatmate, expense tracker, shared expenses, roommate, flat management" />

    <title>MilBaant - Flatmate Expense Manager</title>

    <!--
      Blocking theme-init script — runs synchronously before first paint.
      Reads the stored theme from localStorage and immediately applies
      data-theme + background-color to <html> so the loader overlay
      matches the app background with zero flash.
    -->
    <script>
      (function () {
        var stored = localStorage.getItem('milbaant-theme-mode')
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        var isDark = stored === 'dark' || (!stored && prefersDark)
        document.documentElement.dataset.theme = isDark ? 'dark' : 'light'
        document.documentElement.style.background = isDark ? '#121212' : '#f8fafc'
        document.body && (document.body.style.background = isDark ? '#121212' : '#f8fafc')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
