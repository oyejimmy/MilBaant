<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background: deep violet → indigo → cobalt -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#5b21b6"/>
      <stop offset="52%"  stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <!-- M letterform: white top → lavender bottom -->
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="6%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c7d7fe"/>
    </linearGradient>

    <!-- Top shine -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Arc line between dots -->
    <linearGradient id="arcLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#67e8f9" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#67e8f9" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0"/>
    </linearGradient>

    <!-- Centre radial light -->
    <radialGradient id="centreGlow" cx="50%" cy="38%" r="52%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- M drop-shadow -->
    <filter id="mShadow" x="-25%" y="-22%" width="150%" height="150%">
      <feDropShadow dx="0" dy="9" stdDeviation="22"
        flood-color="#1e1b4b" flood-opacity="0.55"/>
    </filter>

    <!-- Soft glow behind M -->
    <filter id="mGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Dot glow -->
    <filter id="dotGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>
  <rect width="512" height="330" rx="110" ry="110" fill="url(#shine)"/>
  <rect width="512" height="512" rx="110" fill="url(#centreGlow)"/>

  <!-- ── M – glow halo layer ── -->
  <path
    d="M 108,358 L 108,150 L 256,85 L 404,150 L 404,358 Z
       M 154,358 L 358,358 L 358,222 L 256,166 L 154,222 Z"
    fill="white" fill-rule="evenodd" opacity="0.13"
    filter="url(#mGlow)"/>

  <!-- ── M – main letterform ── -->
  <!--
    Outer (CW):  108,358 → 108,150 → 256,85 → 404,150 → 404,358
    Inner (CCW): 154,358 → 358,358 → 358,222 → 256,166 → 154,222
    Even-odd fill punches the inner V through the outer shape.
  -->
  <path
    d="M 108,358 L 108,150 L 256,85 L 404,150 L 404,358 Z
       M 154,358 L 358,358 L 358,222 L 256,166 L 154,222 Z"
    fill="url(#mGrad)" fill-rule="evenodd"
    filter="url(#mShadow)"/>

  <!-- Left-diagonal highlight (simulates top-left light source) -->
  <line x1="110" y1="152" x2="256" y2="87"
    stroke="rgba(255,255,255,0.38)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ── Three flatmate dots ── -->
  <!-- Shallow arc connecting them -->
  <path d="M 182,422 Q 256,409 330,422"
    fill="none" stroke="url(#arcLine)"
    stroke-width="2.5" stroke-linecap="round"/>

  <g filter="url(#dotGlow)">
    <!-- Left  – light cyan -->
    <circle cx="182" cy="426" r="15" fill="#a5f3fc" opacity="0.88"/>
    <!-- Centre – bright cyan, slightly larger = primary user -->
    <circle cx="256" cy="421" r="19" fill="#67e8f9"/>
    <!-- Right  – soft periwinkle -->
    <circle cx="330" cy="426" r="15" fill="#818cf8" opacity="0.88"/>
  </g>

  <!-- ── Sparkles ── -->
  <!-- Top-right (larger) -->
  <path d="M 422,64 L 424.8,73 L 434,76 L 424.8,79 L 422,88
           L 419.2,79 L 410,76 L 419.2,73 Z"
    fill="rgba(255,255,255,0.44)"/>
  <!-- Top-left (smaller) -->
  <path d="M 88,83 L 90,89 L 96,90 L 90,91 L 88,97
           L 86,91 L 80,90 L 86,89 Z"
    fill="rgba(255,255,255,0.22)"/>
</svg>
