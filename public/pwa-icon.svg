<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: rich indigo → vibrant blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a3a6e"/>
      <stop offset="45%"  stop-color="#1465a3"/>
      <stop offset="100%" stop-color="#1c8ee5"/>
    </linearGradient>

    <!-- Roof gradient: bright white → soft blue-white -->
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d6eeff" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Body gradient: white → light blue -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#c8e4f8" stop-opacity="0.92"/>
    </linearGradient>

    <!-- Shine overlay at top of background -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Door gradient -->
    <linearGradient id="doorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0d4f8a"/>
      <stop offset="100%" stop-color="#0a3a6a"/>
    </linearGradient>

    <!-- Window glass gradient -->
    <linearGradient id="winGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7ec8f5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3a9fd6" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Soft drop shadow for house elements -->
    <filter id="houseShadow" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0a2a50" flood-opacity="0.35"/>
    </filter>

    <!-- Glow filter for the chimney smoke dots -->
    <filter id="glowDot" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Clip path for rounded square background -->
    <clipPath id="roundedBg">
      <rect width="512" height="512" rx="115" ry="115"/>
    </clipPath>
  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bgGrad)"/>

  <!-- Top shine overlay -->
  <rect width="512" height="280" rx="115" ry="115" fill="url(#shineGrad)"/>

  <!-- Subtle grid pattern overlay for texture -->
  <g clip-path="url(#roundedBg)" opacity="0.04">
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
  </g>

  <!-- ── House group (centered, with shadow) ── -->
  <g filter="url(#houseShadow)">

    <!-- Chimney (behind roof) -->
    <rect x="310" y="118" width="32" height="60" rx="5" ry="5"
      fill="url(#bodyGrad)" opacity="0.9"/>

    <!-- Roof (triangle) -->
    <polygon
      points="256,88 406,228 106,228"
      fill="url(#roofGrad)"
    />

    <!-- Roof ridge highlight -->
    <polygon
      points="256,88 406,228 386,228 256,112 126,228 106,228"
      fill="rgba(255,255,255,0.18)"
    />

    <!-- Roof bottom edge shadow line -->
    <line x1="106" y1="228" x2="406" y2="228"
      stroke="rgba(0,60,120,0.15)" stroke-width="3"/>

    <!-- House body -->
    <rect x="138" y="226" width="236" height="188" rx="8" ry="8"
      fill="url(#bodyGrad)"
    />

    <!-- ── Left window ── -->
    <rect x="158" y="256" width="68" height="58" rx="10" ry="10"
      fill="url(#winGrad)"
    />
    <!-- Window frame -->
    <rect x="158" y="256" width="68" height="58" rx="10" ry="10"
      fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"/>
    <!-- Window cross bars -->
    <line x1="192" y1="258" x2="192" y2="312"
      stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
    <line x1="160" y1="285" x2="224" y2="285"
      stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
    <!-- Window glare -->
    <rect x="162" y="260" width="26" height="22" rx="4"
      fill="rgba(255,255,255,0.25)"/>

    <!-- ── Right window ── -->
    <rect x="286" y="256" width="68" height="58" rx="10" ry="10"
      fill="url(#winGrad)"
    />
    <!-- Window frame -->
    <rect x="286" y="256" width="68" height="58" rx="10" ry="10"
      fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5"/>
    <!-- Window cross bars -->
    <line x1="320" y1="258" x2="320" y2="312"
      stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
    <line x1="288" y1="285" x2="352" y2="285"
      stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
    <!-- Window glare -->
    <rect x="290" y="260" width="26" height="22" rx="4"
      fill="rgba(255,255,255,0.25)"/>

    <!-- ── Door ── -->
    <!-- Door frame/surround -->
    <rect x="214" y="330" width="84" height="84" rx="42" ry="12"
      fill="rgba(0,50,100,0.2)"/>
    <!-- Door body -->
    <rect x="218" y="332" width="76" height="82" rx="38" ry="10"
      fill="url(#doorGrad)"
    />
    <!-- Door panel detail -->
    <rect x="228" y="344" width="56" height="36" rx="6"
      fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <!-- Door knob -->
    <circle cx="284" cy="374" r="7" fill="rgba(255,255,255,0.55)"/>
    <circle cx="284" cy="374" r="4" fill="rgba(255,200,80,0.9)"/>

    <!-- House base / step -->
    <rect x="138" y="410" width="236" height="8" rx="4"
      fill="rgba(0,50,100,0.15)"/>

  </g>

  <!-- ── Chimney smoke dots (decorative) ── -->
  <circle cx="326" cy="104" r="7"  fill="rgba(255,255,255,0.35)" filter="url(#glowDot)"/>
  <circle cx="336" cy="88"  r="5"  fill="rgba(255,255,255,0.25)" filter="url(#glowDot)"/>
  <circle cx="320" cy="76"  r="4"  fill="rgba(255,255,255,0.18)" filter="url(#glowDot)"/>

  <!-- ── Bottom: three flatmate dots ── -->
  <g opacity="0.85">
    <!-- Left person -->
    <circle cx="196" cy="456" r="18" fill="rgba(255,255,255,0.18)"/>
    <circle cx="196" cy="448" r="9"  fill="rgba(255,255,255,0.55)"/>
    <ellipse cx="196" cy="468" rx="13" ry="8" fill="rgba(255,255,255,0.45)"/>

    <!-- Center person (slightly larger = admin/main) -->
    <circle cx="256" cy="454" r="20" fill="rgba(255,255,255,0.22)"/>
    <circle cx="256" cy="445" r="11" fill="rgba(255,255,255,0.70)"/>
    <ellipse cx="256" cy="467" rx="15" ry="9" fill="rgba(255,255,255,0.60)"/>

    <!-- Right person -->
    <circle cx="316" cy="456" r="18" fill="rgba(255,255,255,0.18)"/>
    <circle cx="316" cy="448" r="9"  fill="rgba(255,255,255,0.55)"/>
    <ellipse cx="316" cy="468" rx="13" ry="8" fill="rgba(255,255,255,0.45)"/>
  </g>

  <!-- ── Stars / sparkles (top corners, decorative) ── -->
  <g fill="rgba(255,255,255,0.4)">
    <!-- Top-left sparkle -->
    <polygon points="72,72 76,84 88,88 76,92 72,104 68,92 56,88 68,84" transform="scale(0.7) translate(40,30)"/>
    <!-- Top-right sparkle -->
    <polygon points="440,60 444,72 456,76 444,80 440,92 436,80 424,76 436,72" transform="scale(0.55) translate(360,20)"/>
  </g>

  <!-- ── "M" monogram — subtle, bottom-right corner ── -->
  <text
    x="462" y="490"
    font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="800"
    fill="rgba(255,255,255,0.22)"
    text-anchor="middle"
    letter-spacing="-1"
  >M</text>
</svg>
