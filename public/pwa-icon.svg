<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main gradient: deep blue to sky blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1465a3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1c8ee5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#49a5ea;stop-opacity:1" />
    </linearGradient>
    <!-- Accent gradient for the roof/house element -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#b9dcf7;stop-opacity:0.85" />
    </linearGradient>
    <!-- Subtle inner glow -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Drop shadow for depth -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Subtle inner highlight at top -->
  <rect width="512" height="256" rx="112" ry="112" fill="rgba(255,255,255,0.06)"/>

  <!-- House / home icon — the core symbol -->
  <!-- Roof (triangle) -->
  <polygon
    points="256,100 390,230 122,230"
    fill="url(#accentGrad)"
    filter="url(#shadow)"
  />
  <!-- Roof ridge cap -->
  <polygon
    points="256,100 390,230 370,230 256,128 142,230 122,230"
    fill="rgba(255,255,255,0.15)"
  />

  <!-- House body -->
  <rect x="152" y="228" width="208" height="168" rx="10" ry="10"
    fill="url(#accentGrad)"
    filter="url(#shadow)"
  />

  <!-- Door -->
  <rect x="220" y="310" width="72" height="86" rx="36" ry="10"
    fill="rgba(20,101,163,0.55)"
  />
  <!-- Door knob -->
  <circle cx="284" cy="356" r="6" fill="rgba(255,255,255,0.7)"/>

  <!-- Left window -->
  <rect x="168" y="258" width="52" height="44" rx="8" ry="8"
    fill="rgba(20,101,163,0.4)"
  />
  <!-- Left window cross -->
  <line x1="194" y1="258" x2="194" y2="302" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
  <line x1="168" y1="280" x2="220" y2="280" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>

  <!-- Right window -->
  <rect x="292" y="258" width="52" height="44" rx="8" ry="8"
    fill="rgba(20,101,163,0.4)"
  />
  <!-- Right window cross -->
  <line x1="318" y1="258" x2="318" y2="302" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>
  <line x1="292" y1="280" x2="344" y2="280" stroke="rgba(255,255,255,0.5)" stroke-width="3"/>

  <!-- "M" letterform — subtle, centered in the roof area -->
  <!-- Removed to keep icon clean; the house IS the brand mark -->

  <!-- Bottom accent bar — a thin strip suggesting a foundation/ground line -->
  <rect x="152" y="394" width="208" height="6" rx="3"
    fill="rgba(255,255,255,0.25)"
  />

  <!-- Small people/flatmates dots — three circles suggesting community -->
  <circle cx="216" cy="430" r="14" fill="rgba(255,255,255,0.30)"/>
  <circle cx="256" cy="430" r="14" fill="rgba(255,255,255,0.45)"/>
  <circle cx="296" cy="430" r="14" fill="rgba(255,255,255,0.30)"/>
</svg>
